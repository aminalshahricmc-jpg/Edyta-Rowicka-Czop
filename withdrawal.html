<!DOCTYPE html>
<html lang="pl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wypłata</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    font-weight: bold;
    text-align: center;
}

.container {
    padding: 20px;
}

.top-text {
    margin-top: 40px;
    font-size: 18px;
}

input, select {
    width: 90%;
    max-width: 400px;
    padding: 15px;
    margin: 10px auto;
    display: block;
    border: none;
    font-size: 16px;
}

button {
    width: 90%;
    max-width: 400px;
    padding: 20px;
    margin: 15px auto;
    display: block;
    background: white;
    color: black;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

.back {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 15px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: black;
    border: 2px solid white;
    padding: 30px;
    width: 80%;
    max-width: 300px;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">← Powrót</button>

<div class="container">
    <h2>Wypłata</h2>

    <div class="top-text">WYPŁATY SĄ DARMOWE</div>

    <select>
        <option>PKO Bank Polski</option>
        <option>mBank</option>
        <option>ING Bank Śląski</option>
        <option>Santander Bank Polska</option>
        <option>Alior Bank</option>
        <option>Bank Pekao</option>
        <option>Postal Bank</option>
    </select>

    <input type="text" placeholder="Nazwa konta">
    <input type="text" placeholder="Numer konta">
    <input type="number" placeholder="Kwota">

    <button onclick="show()">Wypłać</button>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <p>Aktywuj konto kwotą 200 zł, aby usunąć podatki</p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
function show(){
    document.getElementById("modal").style.display = "flex";
}
function closeModal(){
    document.getElementById("modal").style.display = "none";
}
function goBack(){
    window.location.href = "home.html";
}
</script>

</body>
  </html>
